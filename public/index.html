<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AlmacénPro — Gestión Total</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    /* Estilos base */
    :root { --bg: #0d0f14; --surface: #141720; --border: #252a3a; --accent: #4ade80; --text: #e8eaf0; --muted: #6b7280; --danger: #f43f5e; }
    body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; }
    
    /* Navbar */
    nav { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 20px; height: 60px; display: flex; align-items: center; gap: 15px; position: sticky; top: 0; }
    .brand { font-family: 'Syne', sans-serif; font-weight: 800; color: var(--accent); margin-right: 20px; }
    .nav-btn { background: none; border: none; color: var(--muted); cursor: pointer; font-weight: 500; padding: 8px 12px; border-radius: 6px; }
    .nav-btn:hover, .nav-btn.active { color: var(--accent); background: rgba(74,222,128,0.1); }
    
    /* Status */
    .status { margin-left: auto; font-family: 'DM Mono', monospace; font-size: 12px; display: flex; align-items: center; gap: 8px; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); }
    .dot.ok { background: var(--accent); box-shadow: 0 0 8px var(--accent); }

    /* Layout */
    main { padding: 30px; max-width: 1000px; margin: 0 auto; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
    .form-row { display: flex; gap: 10px; margin-bottom: 20px; align-items: flex-end; }
    .group { display: flex; flex-direction: column; gap: 5px; flex: 1; }
    label { font-size: 11px; color: var(--muted); text-transform: uppercase; font-family: 'DM Mono'; }
    input { background: #1c2030; border: 1px solid var(--border); color: white; padding: 10px; border-radius: 6px; }
    
    /* Tabla */
    table { width: 100%; border-collapse: collapse; margin-top: 10px; }
    th { text-align: left; padding: 12px; border-bottom: 2px solid var(--border); color: var(--muted); font-size: 12px; }
    td { padding: 12px; border-bottom: 1px solid var(--border); }
    .btn-del { color: var(--danger); background: none; border: 1px solid var(--danger); padding: 4px 8px; border-radius: 4px; cursor: pointer; }
  </style>
</head>
<body>

<nav>
  <div class="brand">ALMACÉN PRO</div>
  <button class="nav-btn" onclick="navigate('conceptos')">Conceptos</button>
  <button class="nav-btn" onclick="navigate('destinos')">Destinos</button>
  <button class="nav-btn" onclick="navigate('productos')">Productos</button>
  <button class="nav-btn" onclick="navigate('unidades')">Unidades</button>
  <div class="status">
    <div id="dot" class="dot"></div>
    <span id="statusTxt">Verificando...</span>
  </div>
</nav>

<main id="view"></main>

<script>
const API = "/api";

async function apiFetch(path, opts = {}) {
  const res = await fetch(API + path, {
    headers: { 'Content-Type': 'application/json' },
    ...opts
  });
  return res.json();
}

async function checkStatus() {
  try {
    await apiFetch("/health");
    document.getElementById("dot").className = "dot ok";
    document.getElementById("statusTxt").innerText = "BD Conectada";
  } catch {
    document.getElementById("dot").className = "dot";
    document.getElementById("statusTxt").innerText = "Sin Conexión";
  }
}

// GENERADOR DE PÁGINAS
function renderPage(config) {
  const view = document.getElementById("view");
  view.innerHTML = `
    <h1>${config.title}</h1>
    <div class="card">
      <div class="form-row">
        ${config.fields.map(f => `
          <div class="group">
            <label>${f.label}</label>
            <input id="in_${f.key}" type="${f.type || 'text'}">
          </div>
        `).join('')}
        <button onclick="save('${config.route}')" style="background:var(--accent); border:none; padding:10px 20px; border-radius:6px; cursor:pointer; font-weight:bold">＋ Agregar</button>
      </div>
      <table>
        <thead><tr><th>ID</th>${config.fields.map(f=>`<th>${f.label}</th>`).join('')}<th>Acción</th></tr></thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
  `;
  loadData(config);
}

async function loadData(config) {
  const data = await apiFetch("/" + config.route);
  const tbody = document.getElementById("tableBody");
  tbody.innerHTML = data.map(item => `
    <tr>
      <td>#${item.id}</td>
      ${config.fields.map(f => `<td>${item[f.key] || ''}</td>`).join('')}
      <td><button class="btn-del" onclick="remove('${config.route}', ${item.id})">Eliminar</button></td>
    </tr>
  `).join('');
  window.currentConfig = config;
}

async function save(route) {
  const body = {};
  window.currentConfig.fields.forEach(f => {
    body[f.key] = document.getElementById("in_" + f.key).value;
  });
  await apiFetch("/" + route, { method: 'POST', body: JSON.stringify(body) });
  loadData(window.currentConfig);
  window.currentConfig.fields.forEach(f => document.getElementById("in_" + f.key).value = "");
}

async function remove(route, id) {
  if(confirm("¿Eliminar?")) {
    await apiFetch(`/${route}/${id}`, { method: 'DELETE' });
    loadData(window.currentConfig);
  }
}

const pages = {
  conceptos: { title: "Conceptos", route: "conceptos", fields: [{key:"nombre", label:"Nombre"}, {key:"descripcion", label:"Descripción"}] },
  destinos: { title: "Destinos", route: "destinos", fields: [{key:"nombre", label:"Nombre Destino"}, {key:"responsable", label:"Responsable"}] },
  productos: { title: "Productos", route: "productos", fields: [{key:"nombre", label:"Producto"}, {key:"precio", label:"Precio", type:"number"}] },
  unidades: { title: "Unidades", route: "unidades", fields: [{key:"nombre", label:"Unidad"}, {key:"abreviatura", label:"Abrev."}] }
};

function navigate(p) {
  renderPage(pages[p]);
  document.querySelectorAll(".nav-btn").forEach(b => b.classList.toggle("active", b.innerText.toLowerCase().includes(p)));
}

// Inicio
checkStatus();
navigate('conceptos');
</script>
</body>
</html>
