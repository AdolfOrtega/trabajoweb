<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <base href="/">
  <title>AlmacénPro — Sistema de Gestión</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    /* Tu CSS se mantiene igual (está excelente) */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #0d0f14; --surface: #141720; --surface2: #1c2030; --border: #252a3a; --accent: #4ade80; --accent2: #22d3ee; --warn: #f97316; --danger: #f43f5e; --text: #e8eaf0; --muted: #6b7280; --radius: 10px; }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; overflow: hidden; }
    #app { display: grid; grid-template-rows: 64px 1fr; height: 100vh; }
    nav { background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 24px; gap: 8px; position: sticky; top: 0; z-index: 100; }
    .nav-brand { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.1rem; color: var(--accent); letter-spacing: -0.5px; margin-right: 16px; white-space: nowrap; cursor: pointer; }
    .nav-brand span { color: var(--text); }
    .nav-group { display: flex; align-items: center; position: relative; }
    .nav-group-label { font-family: 'DM Mono', monospace; font-size: 0.7rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; padding: 6px 10px; cursor: default; user-select: none; }
    .nav-items { display: flex; gap: 2px; }
    .nav-btn { font-family: 'Inter', sans-serif; font-size: 0.82rem; font-weight: 500; color: var(--muted); background: transparent; border: none; padding: 6px 14px; border-radius: 6px; cursor: pointer; transition: all .15s; white-space: nowrap; }
    .nav-btn:hover { background: var(--surface2); color: var(--text); }
    .nav-btn.active { background: rgba(74,222,128,.12); color: var(--accent); }
    .nav-sep { width: 1px; height: 20px; background: var(--border); margin: 0 8px; }
    .nav-status { margin-left: auto; display: flex; align-items: center; gap: 6px; font-family: 'DM Mono', monospace; font-size: 0.7rem; color: var(--muted); }
    .status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); }
    .status-dot.ok { background: var(--accent); animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
    main { overflow-y: auto; padding: 32px; }
    .page-header { margin-bottom: 28px; }
    .page-header h1 { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1.6rem; }
    .page-header p { color: var(--muted); font-size: 0.875rem; margin-top: 4px; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
    .form-row { display: flex; gap: 10px; flex-wrap: wrap; padding: 16px 20px; border-bottom: 1px solid var(--border); }
    .form-group { display: flex; flex-direction: column; gap: 5px; flex: 1; min-width: 160px; }
    .form-group label { font-size: 0.72rem; color: var(--muted); text-transform: uppercase; font-family:'DM Mono',monospace; }
    .form-group input { background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 8px 12px; border-radius: 6px; outline: none; }
    .btn { font-family: 'Inter', sans-serif; font-size: 0.8rem; font-weight: 500; padding: 7px 16px; border-radius: 6px; border: none; cursor: pointer; transition: all .15s; display: inline-flex; align-items: center; gap: 6px; }
    .btn-primary { background: var(--accent); color: #0d0f14; }
    .btn-danger { background: rgba(244,63,94,.15); color: var(--danger); border: 1px solid rgba(244,63,94,.3); }
    .btn-sm { padding: 4px 10px; font-size: 0.75rem; }
    table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    thead { background: var(--surface2); }
    thead th { padding: 10px 16px; text-align: left; font-family: 'DM Mono', monospace; font-size: 0.7rem; text-transform: uppercase; color: var(--muted); }
    tbody tr { border-bottom: 1px solid var(--border); }
    tbody td { padding: 11px 16px; }
    #toast { position: fixed; bottom: 24px; right: 24px; background: var(--surface2); border: 1px solid var(--border); padding: 10px 18px; border-radius: 8px; font-size: 0.85rem; opacity: 0; transform: translateY(8px); transition: all .25s; z-index: 300; pointer-events: none; }
    #toast.show { opacity: 1; transform: translateY(0); }
    #toast.ok { border-color: rgba(74,222,128,.4); color: var(--accent); }
    #toast.err { border-color: rgba(244,63,94,.4); color: var(--danger); }
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.65); backdrop-filter: blur(4px); display: flex; align-items: center; justify-content: center; z-index: 200; opacity: 0; pointer-events: none; transition: opacity .2s; }
    .modal-overlay.open { opacity: 1; pointer-events: all; }
    .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; width: 100%; max-width: 500px; padding: 24px; }
  </style>
</head>
<body>
<div id="app">
  <nav>
    <div class="nav-brand" onclick="navigate('home')">Almacén<span>Pro</span></div>
    <div class="nav-group">
      <span class="nav-group-label">Catálogos</span>
      <div class="nav-items">
        <button class="nav-btn" data-page="conceptos">Conceptos</button>
        <button class="nav-btn" data-page="destinos">Destinos</button>
        <button class="nav-btn" data-page="productos">Productos</button>
        <button class="nav-btn" data-page="unidades">Unidades</button>
      </div>
    </div>
    <div class="nav-sep"></div>
    <div class="nav-status">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">verificando…</span>
    </div>
  </nav>
  <main id="content"></main>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-title" id="modalTitle" style="font-family:'Syne'; font-weight:700; margin-bottom:15px">Editar</div>
    <div id="modalBody"></div>
    <div class="modal-actions" style="display:flex; justify-content:flex-end; gap:10px; margin-top:20px">
      <button class="btn btn-danger" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" id="modalSave">Guardar</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// 1. CONFIG: Aseguramos ruta absoluta para la API evitando errores de SPA
// Asegúrate de que esta línea esté así:
const API_URL = "/api";

// 2. API FETCH corregido para manejar respuestas no-JSON (evita el "Unexpected token <")
async function apiFetch(endpoint, opts = {}) {
  try {
    const res = await fetch(API_URL + endpoint, {
      headers: { "Content-Type": "application/json" },
      ...opts,
    });
    
    const contentType = res.headers.get("content-type");
    if (!contentType || !contentType.includes("application/json")) {
      // Si recibimos HTML es que la ruta falló y nos mandó el index.html
      throw new Error("Ruta no válida o el servidor respondió con HTML");
    }

    const data = await res.json();
    if (!res.ok) throw new Error(data.error || "Error en el servidor");
    return data;
  } catch (err) {
    console.error("Error en petición:", err);
    throw err;
  }
}

// 3. TOAST Y MODAL
function showToast(msg, type = "ok") {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.className = `show ${type}`;
  setTimeout(() => t.className = "", 3000);
}

function openModal(title, bodyHTML, onSave) {
  document.getElementById("modalTitle").textContent = title;
  document.getElementById("modalBody").innerHTML = bodyHTML;
  document.getElementById("modalSave").onclick = onSave;
  document.getElementById("modalOverlay").classList.add("open");
}
function closeModal() { document.getElementById("modalOverlay").classList.remove("open"); }

// 4. ESTADO DE CONEXIÓN
async function checkStatus() {
  try {
    await apiFetch("/health");
    document.getElementById("statusDot").className = "status-dot ok";
    document.getElementById("statusText").textContent = "BD conectada";
  } catch {
    document.getElementById("statusDot").className = "status-dot";
    document.getElementById("statusText").textContent = "Sin conexión";
  }
}

// 5. GENERADOR DE CATÁLOGOS
function makeCatalogPage({ title, desc, endpoint, fields, columns, renderRow }) {
  return async function() {
    const content = document.getElementById("content");
    content.innerHTML = `
      <div class="page-header"><h1>${title}</h1><p>${desc}</p></div>
      <div class="card">
        <div class="form-row">
          ${fields.map(f => `<div class="form-group"><label>${f.label}</label><input id="f_${f.key}" type="${f.type||'text'}"></div>`).join("")}
          <button class="btn btn-primary" id="btnAdd" style="align-self:flex-end">＋ Agregar</button>
        </div>
        <table>
          <thead><tr><th>ID</th>${columns.map(c=>`<th>${c}</th>`).join("")}<th>Acciones</th></tr></thead>
          <tbody id="tbody"><tr><td colspan="10" style="padding:40px; text-align:center">Cargando datos...</td></tr></tbody>
        </table>
      </div>`;

    const load = async () => {
      try {
        const rows = await apiFetch(endpoint);
        document.getElementById("tbody").innerHTML = rows.map(r => `
          <tr>
            <td class="td-id">#${r.id}</td>
            ${renderRow(r)}
            <td>
              <button class="btn btn-danger btn-sm" onclick="delRec('${endpoint}',${r.id})">✕</button>
            </td>
          </tr>`).join("") || '<tr><td colspan="10" style="padding:20px; text-align:center">No hay registros</td></tr>';
      } catch(e) { showToast(e.message, "err"); }
    };

    document.getElementById("btnAdd").onclick = async () => {
      const body = {};
      fields.forEach(f => body[f.key] = document.getElementById("f_"+f.key).value);
      try {
        await apiFetch(endpoint, { method:"POST", body:JSON.stringify(body) });
        load();
        showToast("Registro guardado");
        fields.forEach(f => document.getElementById("f_"+f.key).value = "");
      } catch(e) { showToast(e.message, "err"); }
    };
    load();
    window._reload = load;
  }
}

async function delRec(e, id) {
  if(confirm("¿Eliminar registro?")) {
    try {
      await apiFetch(`${e}/${id}`, { method:"DELETE" });
      window._reload();
      showToast("Eliminado");
    } catch(e) { showToast(e.message, "err"); }
  }
}

// 6. RUTAS Y NAVEGACIÓN
const pages = {
  home: () => { document.getElementById("content").innerHTML = `<div class="page-header"><h1>Bienvenido</h1><p>Selecciona un módulo del menú superior para comenzar.</p></div>`; },
  conceptos: makeCatalogPage({ title:"Conceptos", endpoint:"/conceptos", fields:[{key:"nombre",label:"Nombre"},{key:"descripcion",label:"Descripción"}], columns:["Nombre","Descripción"], renderRow: r=>`<td>${r.nombre}</td><td>${r.descripcion||'—'}</td>` }),
  destinos: makeCatalogPage({ title:"Destinos", endpoint:"/destinos", fields:[{key:"nombre",label:"Nombre"},{key:"responsable",label:"Responsable"}], columns:["Nombre","Responsable"], renderRow: r=>`<td>${r.nombre}</td><td>${r.responsable||'—'}</td>` }),
  productos: makeCatalogPage({ title:"Productos", endpoint:"/productos", fields:[{key:"nombre",label:"Nombre"},{key:"precio",label:"Precio",type:"number"}], columns:["Nombre","Precio"], renderRow: r=>`<td>${r.nombre}</td><td>$${r.precio}</td>` }),
  unidades: makeCatalogPage({ title:"Unidades", endpoint:"/unidades", fields:[{key:"nombre",label:"Nombre"},{key:"abreviatura",label:"Abreviatura"}], columns:["Nombre","Abr."], renderRow: r=>`<td>${r.nombre}</td><td>${r.abreviatura}</td>` }),
};

function navigate(page) {
  if (!pages[page]) page = "home";
  document.querySelectorAll(".nav-btn").forEach(btn => btn.classList.toggle("active", btn.dataset.page === page));
  history.pushState({ page }, "", page === "home" ? "/" : `/${page}`);
  pages[page]();
}

document.querySelectorAll(".nav-btn").forEach(b => b.onclick = () => navigate(b.dataset.page));
window.onpopstate = (e) => navigate(e.state?.page || "home");

// INIT
navigate(location.pathname.replace("/","") || 'home');
checkStatus();
setInterval(checkStatus, 30000);
</script>
</body>
</html>
